project: Bychat
source: ROADMAP.yaml
status_values:
  - pending
  - active
  - blocked
  - done
priority_values:
  - critical
  - high
  - medium
  - low

definition_of_done:
  - 功能实现完整且无占位代码
  - 单元测试和必要的集成测试通过
  - Debug APK构建通过
  - 数据库与协议变更具备兼容或迁移方案
  - 用户可见功能具有中文错误提示
  - 安全边界和输入限制已落实

