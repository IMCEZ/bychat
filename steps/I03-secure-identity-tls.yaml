iteration: I03
name: 安全身份登录与TLS信任
source_backlog: BACKLOG.yaml
planning_basis:
  repository_head_when_planned: d38627d
  current_runtime_chain: legacy_json_lines
  target_runtime_chain: protocol_v2_length_prefixed_tls
prerequisite:
  required:
    - I01已完成且ProtocolCodec测试通过
    - I02的20个步骤全部完成，不只是I02-B01
    - V2ClientSession、SocketConnector、SessionResumeStore和AuthProvider的最终接口已落地
    - GitHub Actions的testDebugUnitTest与assembleDebug成功
  block_rule: I02未完成前允许提交本计划，禁止执行I03生产代码接线

goal: 用Android Keystore、加密本地身份、Ed25519挑战签名、TLS服务器证书指纹信任和安全会话令牌替代旧credential跨网认证；保持旧链路可回退，直到v2客户端与v2手机主机同时可用

security_choices:
  identity_signature: Ed25519
  identity_library: Google Tink Android
  local_data_cipher: AES-256-GCM
  password_kdf: PBKDF2WithHmacSHA256
  password_kdf_iterations: 310000
  password_salt_bytes: 16
  account_master_key_bytes: 32
  challenge_nonce_bytes: 32
  challenge_ttl_ms: 60000
  session_token_bytes: 32
  session_token_ttl_ms: 604800000
  tls_minimum: TLSv1.2
  fingerprint: SHA-256 of DER encoded leaf certificate
  trust_model: 首次使用确认TOFU，后续严格固定指纹

non_negotiable_rules:
  - 禁止TODO、FIXME、NotImplementedError、空实现、固定假密钥、固定假签名、固定假令牌和跳过证书校验
  - 禁止TrustManager接受所有证书
  - 禁止HostnameVerifier无条件返回true
  - 禁止在日志、异常、通知、Intent、Bundle和剪贴板记录密码、私钥、主密钥、挑战签名或会话令牌
  - 禁止使用java.util.Random生成任何安全材料
  - 密码和明文密钥优先使用CharArray或ByteArray，使用后清零
  - 所有认证比较使用常量时间比较
  - 所有认证请求必须绑定服务器、社区、挑战、用户和协议版本
  - 所有挑战必须一次性、短时有效并在成功或失败后消费
  - 所有令牌必须只以哈希形式存入服务器数据库
  - 首次TLS指纹必须经用户明确确认，不能自动信任
  - 指纹变化必须阻断，不允许静默更新
  - 数据库升级必须有迁移测试，不允许卸载重装作为迁移方案
  - 旧账号和旧消息不得因升级丢失
  - 每个步骤结束必须通过对应测试，最终必须通过全部测试与assembleDebug

global_must_not_touch:
  - 旧消息表内容
  - 现有用户名与密码登录入口的用户数据
  - 语音录制与播放逻辑
  - 消息展示逻辑
  - 房主管理业务语义
  - protocol-v2既有错误码数值和wireName
  - protocol-v2既有PacketType字符串
  - GitHub仓库历史
  - 任何已发布APK签名材料

steps:
  - id: I03-S01
    backlog:
      - P02-E01-T01
    title: 冻结身份与认证数据模型
    objective: 在改数据库前固定本地账号、服务器身份、挑战和会话的字段与生命周期
    what_to_do:
      - 新建docs/security-identity-v1.md
      - 定义LocalAccount、IdentityKey、ServerTrust、ServerRegistration、AuthChallenge和ServerSession字段表
      - 定义每个敏感字段是明文、密文、哈希还是不可持久化
      - 定义账号创建、解锁、注册、登录、注销、密钥失效和指纹变化状态图
      - 定义旧username加password账号到新身份账号的迁移流程
      - 定义威胁边界：服务器不可信、网络不可信、本机解锁后应用进程可信
    technology:
      - Markdown规范
      - 数据分类表
      - 状态机图使用Mermaid文本
    touch:
      - 新增 docs/security-identity-v1.md
    must_not_touch:
      - 生产代码
      - 数据库
    boundary:
      - 文档必须与后续字段命名一致
      - 不宣称端到端加密；TLS只保护传输，服务器仍可读取社区消息
    expected_result:
      - 身份与认证实现有唯一规范来源
      - 明确所有敏感数据的存储和擦除规则
    minimal_self_check:
      - grep确认六类模型名称全部存在
      - grep确认包含“不提供端到端加密”说明
      - git diff --check无输出

  - id: I03-S02
    backlog:
      - P02-E01-T03
      - P02-E01-T04
    title: 添加并锁定密码学依赖
    objective: 为Android 10以上提供一致Ed25519实现，不依赖设备厂商Provider差异
    what_to_do:
      - 在app/build.gradle添加Google Tink Android稳定固定版本
      - 不使用动态版本、SNAPSHOT或未固定Git提交
      - 添加dependency verification或至少记录依赖版本与用途到security文档
      - 启用R8所需规则并验证Release编译不删除Tink关键实现
      - 新增CryptoProviderSmokeTest验证Ed25519生成、签名和验证
    technology:
      - com.google.crypto.tink:tink-android
      - JUnit4
      - Gradle固定版本
    touch:
      - 修改 app/build.gradle
      - 修改 app/proguard-rules.pro
      - 新增 app/src/test/java/com/bychat/app/security/CryptoProviderSmokeTest.kt
      - 修改 docs/security-identity-v1.md
    must_not_touch:
      - compileSdk、minSdk和targetSdk
      - 其他依赖版本
    boundary:
      - 只引入一个密码学依赖
      - 不将测试密钥写入生产源码
    expected_result:
      - JVM测试可生成Ed25519密钥并验证签名
      - Android Release构建保留所需实现
    minimal_self_check:
      - grep依赖只有固定版本且无加号
      - ./gradlew testDebugUnitTest --tests '*CryptoProviderSmokeTest' assembleRelease通过

  - id: I03-S03
    backlog:
      - P02-E01-T04
    title: 实现密码派生与敏感字节工具
    objective: 统一密码派生、随机数、常量时间比较和内存擦除
    what_to_do:
      - 新建SecureBytes，使用SecureRandom生成指定长度字节
      - 新建PasswordKdf，使用PBKDF2WithHmacSHA256、310000次、256位输出
      - 参数对象强制salt至少16字节、迭代不少于210000、输出至少256位
      - 实现MessageDigest.isEqual常量时间比较包装
      - 实现CharArray与ByteArray安全清零函数
      - 所有失败路径在finally清理临时密码与派生密钥
    technology:
      - SecureRandom
      - SecretKeyFactory
      - PBEKeySpec
      - MessageDigest.isEqual
    touch:
      - 新增 app/src/main/java/com/bychat/app/security/SecureBytes.kt
      - 新增 app/src/main/java/com/bychat/app/security/PasswordKdf.kt
      - 新增 app/src/test/java/com/bychat/app/security/PasswordKdfTest.kt
    must_not_touch:
      - 旧Security.kt，本步并行实现后续迁移
    boundary:
      - PasswordKdf不访问数据库或Android Keystore
      - 不返回String形式的明文密钥
    expected_result:
      - 相同参数产生相同派生值，不同salt产生不同值
      - 无效参数被拒绝且输入密码被清理
    minimal_self_check:
      - 测试覆盖确定性、不同salt、参数下限、比较与清零
      - grep -R 'java.util.Random' security生产目录无输出

  - id: I03-S04
    backlog:
      - P02-E01-T03
    title: 实现Android Keystore主密钥
    objective: 用设备硬件或系统Keystore保护应用级包装密钥
    what_to_do:
      - 定义MasterKeyStore接口：createIfAbsent、encrypt、decrypt、delete
      - 实现AndroidMasterKeyStore，别名含应用ID和版本但不含用户名
      - 使用AES-256-GCM、NoPadding、随机12字节IV和AAD
      - KeyGenParameterSpec限制PURPOSE_ENCRYPT与DECRYPT、GCM、无用户认证要求
      - 密文格式带版本、IV、ciphertext和tag，不依赖Java对象序列化
      - 区分KeyPermanentlyInvalidatedException、AEADBadTagException和普通存储错误
      - 测试使用内存FakeMasterKeyStore，Android实现使用instrumentation测试
    technology:
      - AndroidKeyStore
      - AES/GCM/NoPadding
      - KeyGenParameterSpec
    touch:
      - 新增 app/src/main/java/com/bychat/app/security/MasterKeyStore.kt
      - 新增 app/src/main/java/com/bychat/app/security/AndroidMasterKeyStore.kt
      - 新增 app/src/androidTest/java/com/bychat/app/security/AndroidMasterKeyStoreTest.kt
      - 新增 app/src/test/java/com/bychat/app/security/FakeMasterKeyStore.kt
    must_not_touch:
      - Manifest权限
      - 生物识别，本迭代不要求每次系统认证
    boundary:
      - Keystore密钥不可导出
      - 解密失败不得自动删除数据
      - 不使用固定IV
    expected_result:
      - 应用可安全包装和解包本地主密钥
      - 篡改密文必然解密失败
    minimal_self_check:
      - grep确认AES/GCM/NoPadding和随机IV
      - grep确认不存在ECB和固定全零IV
      - connectedAndroidTest在可用设备执行，CI至少assembleAndroidTest通过

  - id: I03-S05
    backlog:
      - P02-E01-T04
    title: 定义版本化加密信封
    objective: 为账号主密钥和私钥密文提供可迁移、可校验格式
    what_to_do:
      - 定义EncryptedBlob字段version、algorithm、iv、ciphertext和aadVersion
      - 实现AES-GCM加解密器，AAD绑定用途、账号ID和记录版本
      - Base64仅用于数据库文本字段编码，不把编码误当加密
      - 解密前校验版本、算法、IV长度和最大密文长度
      - 不支持版本返回明确UNSUPPORTED_PROTOCOL或专用本地错误，不尝试猜测
    technology:
      - AES-256-GCM
      - Gson或明确分隔的版本格式
      - Base64 NO_WRAP
    touch:
      - 新增 app/src/main/java/com/bychat/app/security/EncryptedBlob.kt
      - 新增 app/src/main/java/com/bychat/app/security/LocalCipher.kt
      - 新增 app/src/test/java/com/bychat/app/security/LocalCipherTest.kt
    must_not_touch:
      - 网络协议Envelope
    boundary:
      - 加密信封只用于本地敏感数据
      - AAD不含密码和私钥
    expected_result:
      - 私密数据可加密、解密并检测任意篡改
      - 格式可在未来升级
    minimal_self_check:
      - 测试覆盖往返、错AAD、错密钥、篡改、未知版本和超限
      - ./gradlew testDebugUnitTest --tests '*LocalCipherTest'通过

  - id: I03-S06
    backlog:
      - P02-E01-T01
    title: 设计数据库v2身份表与迁移脚本
    objective: 增加多账号和服务器身份数据，同时保留旧account表与消息
    what_to_do:
      - 数据库版本从1升到2
      - 新建local_account表，保存account_id、username、password_salt、password_verifier、wrapped_master_key、created_at和updated_at
      - 新建identity_key表，保存account_id、public_key、encrypted_private_key、key_version和created_at
      - 新建server_trust表，保存account_id、endpoint_key、leaf_fingerprint、first_seen_at、last_seen_at和confirmed_at
      - 新建server_registration表，保存account_id、endpoint_key、community_id、server_user_id和public_key
      - 新建server_session表，保存account_id、endpoint_key、community_id、token_hash或客户端加密token、expires_at和sync_cursor；客户端令牌必须加密存储
      - 添加外键、唯一约束和查询索引
      - onUpgrade仅处理1到2迁移，未知降级拒绝启动
    technology:
      - SQLiteOpenHelper事务迁移
      - 外键与索引
    touch:
      - 修改 app/src/main/java/com/bychat/app/LocalDb.kt
      - 新增 app/src/main/java/com/bychat/app/data/IdentitySchema.kt
      - 新增 app/src/test/java/com/bychat/app/data/IdentityMigrationTest.kt
    must_not_touch:
      - 旧account表定义
      - message表内容与字段
      - remote_user表内容与字段
    boundary:
      - 本步骤只建表和迁移，不迁移旧密码账号内容
      - 所有建表与版本升级在单一事务内
    expected_result:
      - v1数据库升级后旧三张表数据完整
      - 新身份表具备约束和索引
    minimal_self_check:
      - 测试创建v1样本后升级并逐表核对行数与内容
      - grep确认DATABASE_VERSION为2且无DROP TABLE

  - id: I03-S07
    backlog:
      - P02-E01-T01
      - P02-E01-T04
    title: 实现身份数据库仓库
    objective: 用参数化SQL安全读写加密身份记录
    what_to_do:
      - 定义IdentityRepository接口
      - 实现SqliteIdentityRepository的创建账号、读取账号、保存密钥、读取密钥、保存信任、读取信任、保存会话、清除会话
      - 所有多表写入使用事务
      - 所有查询使用selectionArgs或绑定参数
      - 不向上层返回Cursor
      - 会话token进入仓库前必须已加密
      - 冲突区分用户名重复、服务器注册重复和普通数据库错误
    technology:
      - SQLiteDatabase
      - ContentValues
      - Outcome
    touch:
      - 新增 app/src/main/java/com/bychat/app/data/IdentityRepository.kt
      - 新增 app/src/main/java/com/bychat/app/data/SqliteIdentityRepository.kt
      - 新增 app/src/test/java/com/bychat/app/data/SqliteIdentityRepositoryTest.kt
    must_not_touch:
      - MainActivity
      - 网络层
    boundary:
      - 仓库不处理密码派生和加解密
      - 仓库日志不得输出字段值
    expected_result:
      - 身份相关记录可事务化保存和读取
      - 敏感字段不会以明文进入数据库
    minimal_self_check:
      - 测试覆盖增删改查、唯一冲突、事务回滚和会话清除
      - grep SQL拼接用户输入模式无命中

  - id: I03-S08
    backlog:
      - P02-E02-T01
      - P02-E02-T02
    title: 实现Ed25519身份密钥生成与用户ID
    objective: 为每个本地账号生成长期去中心化身份
    what_to_do:
      - 定义IdentitySigner接口：publicKey、userId、sign
      - 使用Tink生成Ed25519私钥
      - 导出标准化原始32字节公钥或明确版本化公钥格式
      - userId定义为bcu1_加SHA-256公钥摘要的Base32无填充编码
      - 私钥序列化后立即使用账号主密钥加密再持久化
      - 加载时只在内存中短期解密，使用后清理可清理字节
      - 实现verify供服务器验证签名
    technology:
      - Tink PublicKeySign和PublicKeyVerify
      - SHA-256
      - Base32无填充编码
    touch:
      - 新增 app/src/main/java/com/bychat/app/identity/IdentitySigner.kt
      - 新增 app/src/main/java/com/bychat/app/identity/Ed25519Identity.kt
      - 新增 app/src/main/java/com/bychat/app/identity/UserId.kt
      - 新增 app/src/test/java/com/bychat/app/identity/Ed25519IdentityTest.kt
    must_not_touch:
      - 旧Security.kt
      - 用户名格式
    boundary:
      - 用户ID由公钥确定，与昵称和服务器无关
      - 私钥禁止导出到UI或日志
    expected_result:
      - 同一公钥始终产生同一userId
      - 签名只能由对应公钥验证
    minimal_self_check:
      - 测试覆盖稳定ID、不同密钥不同ID、签名、篡改和错误公钥
      - grep生产源码无私钥Base64日志

  - id: I03-S09
    backlog:
      - P02-E01-T04
    title: 实现账号创建与安全解锁服务
    objective: 串联密码、Keystore、账号主密钥和身份私钥
    what_to_do:
      - 创建账号时生成passwordSalt和随机accountMasterKey
      - 用PasswordKdf生成passwordVerifier与passwordWrappingKey，二者必须域分离
      - 用passwordWrappingKey加密accountMasterKey，再由AndroidMasterKeyStore包装整个密码信封
      - 生成Ed25519身份并用accountMasterKey加密私钥
      - 在一个数据库事务内保存账号和身份记录
      - 解锁时先验证密码，再依次解开Keystore层和密码层
      - 任何失败清理密码、派生密钥和主密钥
      - 返回短生命周期UnlockedIdentity，不返回裸私钥
    technology:
      - PasswordKdf
      - MasterKeyStore
      - LocalCipher
      - IdentityRepository
    touch:
      - 新增 app/src/main/java/com/bychat/app/identity/AccountIdentityService.kt
      - 新增 app/src/main/java/com/bychat/app/identity/UnlockedIdentity.kt
      - 新增 app/src/test/java/com/bychat/app/identity/AccountIdentityServiceTest.kt
    must_not_touch:
      - MainActivity登录流程，本步不接UI
      - 旧account表
    boundary:
      - 用户名仍为公开数据
      - UnlockedIdentity关闭后必须不可继续签名
      - 密码错误与密文损坏对UI使用统一提示，详细原因只留非敏感错误码
    expected_result:
      - 新账号创建后具备加密长期身份
      - 正确密码可解锁，错误密码、篡改或缺失Keystore密钥均失败
    minimal_self_check:
      - 测试覆盖成功、错密码、篡改、事务失败回滚和close后拒绝签名
      - 测试断言数据库不含密码和私钥明文片段

  - id: I03-S10
    backlog:
      - P02-E01-T01
      - P02-E02-T05
    title: 迁移旧本地账号为新身份账号
    objective: 用户首次使用新版本登录时无损升级身份
    what_to_do:
      - 旧账号使用原密码验证成功后触发惰性迁移
      - 调用AccountIdentityService创建同用户名的新local_account与identity_key
      - 迁移成功后保留旧account行一个兼容版本周期，不立即删除
      - 记录迁移完成标志，避免每次登录重复生成身份
      - 新身份创建失败时回滚且旧登录仍可用
      - 同名新账号已存在时验证归属，不覆盖
    technology:
      - SQLite事务
      - 旧Security.passwordHash只用于一次迁移验证
    touch:
      - 新增 app/src/main/java/com/bychat/app/identity/LegacyAccountMigrator.kt
      - 修改 app/src/main/java/com/bychat/app/LocalDb.kt，增加只读旧账号验证与迁移标记接口
      - 新增 app/src/test/java/com/bychat/app/identity/LegacyAccountMigratorTest.kt
    must_not_touch:
      - 旧消息
      - remote_user记录
      - 不删除旧account行
    boundary:
      - 禁止将旧passwordHash作为网络credential继续发送
      - 迁移必须由用户输入正确密码触发
    expected_result:
      - 现有用户登录一次后获得新Ed25519身份
      - 失败迁移不锁死旧账号
    minimal_self_check:
      - 测试覆盖首次迁移、重复登录、错密码、写失败回滚和同名冲突
      - grep迁移代码无DELETE FROM account

  - id: I03-S11
    backlog:
      - P02-E02-T03
    title: 定义挑战签名规范与规范化字节
    objective: 防止字段歧义、跨服务器重放和跨社区重放
    what_to_do:
      - 定义ChallengeContext字段protocolVersion、serverId、communityId、challengeId、nonce、userId、issuedAt和expiresAt
      - 定义canonicalBytes，使用固定字段顺序、固定UTF-8、长度前缀，不使用字符串拼接JSON作为签名内容
      - 每个字符串限制长度，nonce固定32字节
      - 签名域前缀固定BYCHAT-AUTH-V2
      - 客户端签名与服务器验证使用相同canonicalBytes实现
    technology:
      - ByteArrayOutputStream
      - DataOutputStream大端长度
