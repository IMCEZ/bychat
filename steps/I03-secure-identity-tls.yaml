token_efficient_review:
  - 正常步骤只输出修改文件列表、测试通过数和提交号
  - 编译失败只读取第一个error对应文件前后25行
  - 测试失败只重跑失败测试类
  - 数据迁移用表行数和哈希核对，不回显敏感内容
  - 安全审计只输出命中文件和行号，不输出秘密字段值
  - 最终只报告单元测试数、迁移测试结果、APK路径、提交号和Actions状态

