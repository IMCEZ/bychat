      - 固定种子Random
      - 内存流与本地回环Socket
    touch:
      - 新增 app/src/test/java/com/bychat/app/network/MalformedInputTest.kt
      - 新增 app/src/test/java/com/bychat/app/network/AbruptDisconnectTest.kt
    must_not_touch:
      - 生产代码；若测试发现缺陷，回到责任步骤单独修复并重新运行全套测试
    boundary:
      - 禁止连接公网
      - 模糊测试固定种子保证可复现
      - 不捕获Throwable后无条件通过
    expected_result:
      - 恶意输入和异常断开均受控结束
      - 生命周期回调无重复
    minimal_self_check:
      - grep -c '@Test'两个文件合计不少于18
      - ./gradlew testDebugUnitTest --tests '*MalformedInputTest' --tests '*AbruptDisconnectTest'通过

