  fast_boundary: git diff --name-only 14497df..HEAD
  network_tests: ./gradlew testDebugUnitTest --tests 'com.bychat.app.network.*' --no-daemon
  protocol_tests: ./gradlew testDebugUnitTest --tests 'com.bychat.app.protocol.*' --no-daemon
