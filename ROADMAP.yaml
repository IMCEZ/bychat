project:
  name: Bychat
  chinese_name: 边聊
  target: 去中心化、设备可自建服务器的社区聊天应用
  product_reference:
    - WeChat
    - Discord
  platform:
    - Android 10+

principles:
  - 不依赖官方中心聊天服务器
  - 手机主机仅承载一个社区，外部服务器可承载多个社区
  - 用户数据、账号凭据和消息默认本地保存
  - 公网连接支持域名、IPv4、IPv6和端口
  - 网络协议版本化并保持手机主机与外部服务器兼容
  - 安全、稳定性和数据迁移优先于界面扩展

parts:
  - id: P01
    name: 核心架构与协议重构
    goal: 将当前单房间原型升级为可持续扩展的客户端与服务器架构
    scope:
      - 客户端、手机主机和外部服务器职责分离
      - 协议版本、能力协商、请求响应ID和错误码
      - 长连接心跳、断线检测、指数退避重连和会话恢复
      - 数据包长度限制、协议解析保护和速率限制
      - TLS安全连接及服务器指纹确认
      - IPv4、IPv6和域名统一连接模型
    deliverables:
      - protocol-v2规范
      - 可复用网络会话层
      - 兼容性与协议测试
    depends_on: []

  - id: P02
    name: 本地身份与服务器身份
    goal: 建立适用于去中心化网络的安全用户身份体系
    scope:
      - 多本地账号创建、登录、切换和删除
      - 密码安全派生与本地加密凭据库
      - 每个账号生成长期公私钥身份
      - 首次加入服务器时注册身份，后续使用签名挑战登录
      - 服务器独立用户资料、昵称、头像和个人简介
      - 设备迁移、账号导出、加密备份和恢复
      - 服务器指纹、信任记录和身份变更警告
    deliverables:
      - 本地身份库
      - 挑战签名登录流程
      - 加密备份格式
    depends_on:
      - P01

  - id: P03
    name: 社区、频道与成员模型
    goal: 建立类似Discord的社区组织能力
    scope:
      - 手机主机单社区模型
      - 外部服务器多社区模型
      - 社区名称、图标、介绍、所有者和设置
      - 文字频道、公告频道、分类和频道排序
      - 私密频道与成员可见范围
      - 邀请码、邀请链接、有效期和使用次数
      - 成员列表、在线状态、加入时间和备注
      - 社区退出、转让、解散和数据清理
    deliverables:
      - 社区与频道数据模型
      - 社区主页和频道导航
      - 邀请加入流程
    depends_on:
      - P01
      - P02

  - id: P04
    name: 角色、权限与社区治理
    goal: 提供完整房主和管理员治理能力
    scope:
      - 所有者、管理员、版主、成员和自定义角色
      - 基于角色与频道的权限覆盖
      - 踢出、封禁、临时封禁、禁言和解除处罚
      - 消息删除、批量清理、慢速模式和频道锁定
      - 黑名单、敏感词和反刷屏策略
      - 举报、处罚原因和申诉备注
      - 管理操作审计日志
      - 房主紧急关闭注册、只读模式和服务器关闭
    deliverables:
      - 权限计算引擎
      - 管理控制台
      - 审计日志系统
    depends_on:
      - P03

  - id: P05
    name: 完整消息系统
    goal: 提供接近现代社区聊天软件的消息体验
    scope:
      - 文本消息和Markdown安全子集
      - 回复、引用、转发、编辑、撤回和删除
      - 表情回应和消息置顶
      - @用户、@角色和未读提及
      - 消息发送状态、失败重试和幂等去重
      - 游标分页、增量同步和跳转到指定消息
      - 草稿、复制、链接识别和站内搜索
      - 系统事件消息和管理员公告
      - 私聊与小型群聊
    deliverables:
      - 消息时间线
      - 私聊会话列表
      - 搜索与未读系统
    depends_on:
      - P02
      - P03
      - P04

  - id: P06
    name: 语音、图片与文件媒体
    goal: 在录音消息基础上补齐社区媒体能力
    scope:
      - 录音暂停、试听、取消和发送
      - 语音时长、波形、播放进度和倍速
      - 图片选择、拍照、压缩、预览和保存
      - 文件上传、下载、校验、大小限制和失败续传
      - 媒体分块传输，避免JSON Base64占用大量内存
      - 服务端媒体目录、引用计数和空间清理
      - 客户端媒体缓存、缓存上限和手动清理
      - 不受信任文件类型提示
    deliverables:
      - 二进制分块传输协议
      - 语音消息播放器
      - 图片与文件消息
    depends_on:
      - P01
      - P05

  - id: P07
    name: 本地存储、同步与备份
    goal: 确保大量社区数据长期可靠保存
    scope:
      - SQLite数据库版本迁移体系
      - 账号、服务器、社区、频道、成员和消息规范化存储
      - 事务、索引、分页和全文搜索
      - 服务器消息序列号与客户端同步游标
      - 离线消息补拉和历史缺口修复
      - 消息保留周期与服务器磁盘配额
      - 数据库一致性检查和损坏恢复
      - 加密导出、导入与定期备份
    deliverables:
      - 数据库v2
      - 可靠增量同步
      - 备份恢复工具
    depends_on:
      - P02
      - P03
      - P05
      - P06

  - id: P08
    name: 手机自建服务器与公网可用性
    goal: 让普通用户能够可靠地创建和维护社区服务器
    scope:
      - 前台服务生命周期、崩溃恢复和状态页
      - 当前局域网地址、监听地址和端口展示
      - 公网IP与IPv6检测
      - NAT、CGNAT和端口映射诊断
      - UPnP或NAT-PMP自动映射能力评估与实现
      - 路由器端口转发引导
      - 可选中继或用户自备隧道配置，不建设官方聊天服务器
      - 在线人数、连接数、流量、存储和运行时长监控
      - 最大成员数、消息速率和媒体空间限制
      - 电池优化、后台限制和厂商系统设置引导
    deliverables:
      - 创建服务器向导
      - 网络诊断页
      - 服务器运行控制台
    depends_on:
      - P01
      - P03
      - P04
      - P07

  - id: P09
    name: 外部服务器实现
    goal: 提供可长期运行并支持多社区的独立服务器
    scope:
      - 选择适合低配置设备和Linux的服务器语言与运行时
      - 多社区、多频道和多用户并发
      - 与Android手机主机共享protocol-v2
      - 配置文件、环境变量和命令行管理
      - TLS证书、反向代理和域名部署
      - Docker镜像与原生可执行程序
      - 数据备份、恢复、升级和日志轮转
      - 健康检查、指标和资源限制
    deliverables:
      - 独立服务端源码
      - Docker部署文件
      - Linux部署与升级文档
    depends_on:
      - P01
      - P03
      - P04
      - P07

  - id: P10
    name: Android产品界面重构
    goal: 将程序式原型界面升级为完整社区聊天产品
    scope:
      - Material Design 3视觉体系和统一中文文案
      - 登录、账号管理和服务器列表
      - 社区侧边栏、频道列表和成员列表
      - 消息气泡、长按菜单、输入栏和附件面板
      - 私聊、个人资料、设置和管理页面
      - 深色模式、字体缩放和无障碍支持
      - 加载、空状态、错误状态和操作反馈
      - 大列表性能、屏幕旋转和进程恢复
    deliverables:
      - 完整导航架构
      - 社区聊天主界面
      - 设置与管理界面
    depends_on:
      - P02
      - P03
      - P04
      - P05
      - P06

  - id: P11
    name: 通知、后台与在线状态
    goal: 在Android限制下提供可靠提醒和在线体验
    scope:
      - 消息通知、私聊通知和@提及通知
      - 按社区和频道设置通知级别
      - 通知快捷回复与点击定位消息
      - 在线、离开、离线和最后活跃状态
      - 客户端前台服务连接模式
      - 网络切换、休眠唤醒和自动重连
      - Android通知权限与电池优化引导
      - 隐私模式下隐藏通知正文
    deliverables:
      - 通知系统
      - 后台连接服务
      - 在线状态同步
    depends_on:
      - P01
      - P05
      - P10

  - id: P12
    name: 安全、隐私与滥用防护
    goal: 使公网自建服务器具备可接受的安全基线
    scope:
      - 威胁模型和安全边界文档
      - TLS传输与服务器证书或指纹校验
      - 登录防重放、会话令牌轮换和主动注销
      - 密码、公私钥和备份密钥安全存储
      - 数据包、文本、媒体和文件严格校验
      - 登录、发言、邀请和上传速率限制
      - 路径穿越、SQL注入、压缩炸弹和内存耗尽防护
      - 日志隐私清理与敏感数据脱敏
      - 本地应用锁和可选数据库加密
      - 依赖漏洞和许可证检查
    deliverables:
      - 安全基线
      - 自动化滥用测试
      - 隐私设置页面
    depends_on:
      - P01
      - P02
      - P04
      - P06
      - P07
      - P09

  - id: P13
    name: 测试、构建与发布工程
    goal: 建立可重复构建和安全发布流程
    scope:
      - Kotlin单元测试、数据库测试和协议测试
      - 手机主机与客户端集成测试
      - 外部服务器兼容性测试
      - 网络中断、弱网、大消息和并发压力测试
      - 数据库升级和备份恢复测试
      - GitHub Actions编译、测试、静态检查和产物归档
      - 正式签名密钥通过GitHub Secrets注入
      - Debug、Beta和Release构建渠道
      - 版本号、更新日志、APK校验值和GitHub Release
      - 崩溃日志本地导出，不默认上传用户数据
    deliverables:
      - 自动测试套件
      - Release APK自动构建
      - 发布与回滚流程
    depends_on:
      - P01
      - P02
      - P03
      - P04
      - P05
      - P06
      - P07
      - P08
      - P09
      - P10
      - P11
      - P12

milestones:
  - id: M1
    name: 稳定基础版
    includes:
      - P01
      - P02
      - P07
    acceptance:
      - 身份不再直接使用密码派生值跨网传输
      - 客户端可安全重连并恢复消息同步
      - 数据库可从当前版本无损迁移

  - id: M2
    name: 社区聊天核心版
    includes:
      - P03
      - P04
      - P05
    acceptance:
      - 可创建社区、分类和多个频道
      - 角色权限、审核和审计日志可用
      - 文字消息、回复、编辑、撤回、回应、私聊和搜索可用

  - id: M3
    name: 媒体与公网主机版
    includes:
      - P06
      - P08
      - P11
    acceptance:
      - 语音、图片和文件不通过JSON Base64整体传输
      - 手机主机具备网络诊断、资源限制和后台运行能力
      - 通知、网络切换和断线恢复可用

  - id: M4
    name: 外部服务器与完整界面版
    includes:
      - P09
      - P10
    acceptance:
      - 外部服务器支持多社区并可使用Docker部署
      - Android端达到可日常使用的社区导航和聊天体验

  - id: M5
    name: 安全发布版
    includes:
      - P12
      - P13
    acceptance:
      - 安全测试、迁移测试和并发测试通过
      - GitHub Actions可生成签名Release APK和校验值
      - 具备稳定升级、备份和回滚流程

execution_order:
  - M1
  - M2
  - M3
  - M4
  - M5

next_action:
  milestone: M1
  first_part: P01
  first_deliverable: protocol-v2规范与网络会话层
